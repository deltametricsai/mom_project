# Build Spiro Medical PO Generator for Windows (.exe only). Mac build locally if needed.
# Push to GitHub → Actions → "Build PO App" → download windows-build artifact for the .exe.

name: Build PO App

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
