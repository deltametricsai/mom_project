<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiro Medical PO Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>Spiro Medical</h1>
    <p class="subtitle">Purchase Order Generator</p>
  </header>

  <main class="form-container">
    <p class="hint">Enter your PO details. Unique IDs (e.g. PO#) follow your company protocol — type them in below.</p>

    <form id="po-form">
      <div class="field">
        <label for="poNumber">PO # <span class="required">*</span></label>
        <input type="text" id="poNumber" name="poNumber" placeholder="Your PO number (per your protocol)" required>
      </div>
      <div class="field">
        <label for="quoteNumber">Quote #</label>
        <input type="text" id="quoteNumber" name="quoteNumber" placeholder="Quote reference">
      </div>
      <div class="field">
        <label for="date">Date <span class="required">*</span></label>
        <input type="date" id="date" name="date" required>
      </div>
      <div class="field">
        <label for="placedBy">Placed by <span class="required">*</span></label>
        <input type="text" id="placedBy" name="placedBy" placeholder="Name" required>
      </div>
      <div class="field">
        <label for="for">For <span class="required">*</span></label>
        <input type="text" id="for" name="for" placeholder="Department / project / purpose" required>
      </div>
      <div class="field">
        <label for="vendor">Vendor / Supplier</label>
        <input type="text" id="vendor" name="vendor" placeholder="Vendor name">
      </div>
      <div class="field">
        <label for="totalCost">Total Cost <span class="required">*</span></label>
        <input type="number" id="totalCost" name="totalCost" step="0.01" min="0" placeholder="0.00" required>
      </div>
      <div class="field">
        <label for="description">Description / Line items</label>
        <textarea id="description" name="description" rows="4" placeholder="Brief description or line items (optional)"></textarea>
      </div>

      <div class="actions">
        <button type="submit" id="btn-generate" class="btn btn-primary">Generate PO</button>
      </div>
    </form>

    <div id="message" class="message" role="alert" aria-live="polite"></div>
  </main>

  <footer class="footer">
    <p>Runs entirely on your computer. No data is sent to the cloud.</p>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
